# Sveltia CMS scaffold for MALDDONG DONUT.
# TODO: 실제 GitHub 저장소, branch, OAuth/Auth Worker 값을 운영 환경에 맞게 채우세요.
backend:
  name: github
  repo: yjh940331-afk/malddongdonut
  branch: main
  base_url: https://sveltia-cms-auth.yjh940331.workers.dev

locale: "ko"
publish_mode: simple
site_url: https://malddongdonut.com
display_url: https://malddongdonut.com

# 기본(git) 미디어 폴더 — R2 미설정 필드용 폴백
media_folder: "public/uploads"
public_folder: "/uploads"

# Cloudflare R2 미디어 라이브러리 — /admin 에서 업로드한 이미지는 R2 버킷에 저장되고
# https://media.malddongdonut.com/<파일명> 형태의 공개 URL이 콘텐츠 JSON에 기록됨.
# ⚠️ Secret Access Key는 절대 여기 넣지 않음 (최초 업로드 시 브라우저에서 1회 입력 → localStorage 보관).
media_libraries:
  cloudflare_r2:
    access_key_id: fe5dea14d13b8ce61e12d0e34fb66efc
    bucket: malddongdonut-images
    account_id: b8c01aa804c1c42982b17864b74e975b
    public_url: https://media.malddongdonut.com

collections:
  - name: "brand"
    label: "브랜드"
    delete: false
    editor:
      preview: false
    files:
      - name: "brand"
        label: "브랜드 기본 정보"
        file: "src/content/brand.json"
        fields:
          - { label: "브랜드명", name: "name", widget: "string" }
          - { label: "영문명", name: "englishName", widget: "string" }
          - { label: "태그라인", name: "tagline", widget: "string" }
          - { label: "설명", name: "description", widget: "text" }
          - label: "키워드"
            name: "keywords"
            widget: "list"
            field: { label: "키워드", name: "keyword", widget: "string" }
          - label: "링크"
            name: "links"
            widget: "object"
            fields:
              - { label: "네이버지도", name: "map", widget: "string" }
              - { label: "인스타그램", name: "instagram", widget: "string" }
              - { label: "유튜브", name: "youtube", widget: "string" }
              - { label: "블로그", name: "blog", widget: "string", required: false }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "작은 라벨", name: "eyebrow", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - { label: "데스크톱 이미지", name: "imageDesktop", widget: "image" }
              - { label: "모바일 이미지", name: "imageMobile", widget: "image" }
              - { label: "이미지 대체 텍스트", name: "imageAlt", widget: "string" }
          - label: "빠른 정보"
            name: "quickInfo"
            widget: "list"
            fields:
              - { label: "라벨", name: "label", widget: "string" }
              - { label: "값", name: "value", widget: "string" }
          - label: "브랜드 콘셉트"
            name: "concept"
            widget: "object"
            fields:
              - { label: "작은 라벨", name: "eyebrow", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "카드"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "설명", name: "description", widget: "text" }

  - name: "menus"
    label: "메뉴 카테고리"
    editor:
      preview: false
    files:
      - name: "menus"
        label: "대표 디저트"
        file: "src/content/menus.json"
        fields:
          - label: "메뉴"
            name: "menus"
            widget: "list"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - { label: "이미지", name: "image", widget: "image" }
              - { label: "대체 텍스트", name: "alt", widget: "string" }
              - { label: "포인트 라벨", name: "accent", widget: "string", required: false }

  - name: "gallery"
    label: "갤러리"
    editor:
      preview: false
    files:
      - name: "gallery"
        label: "공간/포토존"
        file: "src/content/gallery.json"
        fields:
          - label: "갤러리 항목"
            name: "gallery"
            widget: "list"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "캡션", name: "caption", widget: "string" }
              - { label: "이미지", name: "image", widget: "image" }
              - { label: "썸네일", name: "thumb", widget: "image", required: false }
              - { label: "대체 텍스트", name: "alt", widget: "string" }

  - name: "stores"
    label: "지점"
    editor:
      preview: false
    files:
      - name: "stores"
        label: "지점 목록"
        file: "src/content/stores.json"
        fields:
          - label: "지점"
            name: "stores"
            widget: "list"
            fields:
              - { label: "지점명", name: "name", widget: "string" }
              - { label: "짧은 이름", name: "shortName", widget: "string" }
              - { label: "주소", name: "address", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "태그"
                name: "tags"
                widget: "list"
                field: { label: "태그", name: "tag", widget: "string" }
              - { label: "지도 URL", name: "mapUrl", widget: "string" }
              - { label: "이미지", name: "image", widget: "image" }
              - { label: "대체 텍스트", name: "alt", widget: "string" }
              - { label: "상태", name: "status", widget: "select", options: ["open", "coming-soon"] }
              - { label: "대표 매장", name: "isFeatured", widget: "boolean", default: false }
              - { label: "운영시간 안내", name: "hoursNotice", widget: "string" }

  - name: "social"
    label: "SNS"
    editor:
      preview: false
    files:
      - name: "social"
        label: "소셜 섹션"
        file: "src/content/social.json"
        fields:
          - { label: "인스타그램 URL", name: "instagram", widget: "string" }
          - { label: "유튜브 URL", name: "youtube", widget: "string" }
          - { label: "제목", name: "title", widget: "string" }
          - { label: "설명", name: "description", widget: "text" }
          - label: "소셜 카드"
            name: "items"
            widget: "list"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "string" }
              - { label: "이미지", name: "image", widget: "image" }
              - { label: "대체 텍스트", name: "alt", widget: "string" }
              - { label: "연결 URL", name: "url", widget: "string" }

  - name: "notices"
    label: "공지"
    editor:
      preview: false
    files:
      - name: "notices"
        label: "공지 문구"
        file: "src/content/notices.json"
        fields:
          - label: "공지"
            name: "notices"
            widget: "list"
            fields:
              - { label: "사용 여부", name: "enabled", widget: "boolean", default: true }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - { label: "링크 라벨", name: "linkLabel", widget: "string", required: false }
              - { label: "링크 URL", name: "linkUrl", widget: "string", required: false }
